<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      /* The whole splash is one rounded card centered in a transparent window.
         It fades + lifts in on load, and the main process drives the shrink-to-
         tray exit by animating the window bounds + opacity directly. */
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 320px;
        padding: 34px 28px 26px;
        background: rgba(20, 24, 30, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        color: #ffffff;
        text-align: center;
        opacity: 0;
        transform: translateY(8px) scale(0.98);
        animation: rise 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .icon {
        width: 84px;
        height: 84px;
        border-radius: 20px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        animation: breathe 2.4s ease-in-out infinite;
      }
      /* Once the app is ready the icon settles (the breathing stops). */
      body[data-state="ready"] .icon { animation: none; }

      .title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 0;
      }

      .status {
        font-size: 13.5px;
        font-weight: 500;
        color: rgba(231, 238, 245, 0.7);
        margin: 7px 0 22px;
        min-height: 17px;
        transition: color 0.2s ease;
      }
      body[data-state="ready"] .status { color: #34d399; }
      body[data-state="error"] .status { color: #ff7b7b; }

      /* Indeterminate progress bar: a short segment that sweeps across the
         track while we boot. Hidden once we're ready or hit an error. */
      .track {
        position: relative;
        width: 100%;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .track::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: linear-gradient(90deg, #4aa3ff, #8ec9ff);
        animation: sweep 1.1s ease-in-out infinite;
      }
      body[data-state="ready"] .track,
      body[data-state="error"] .track { opacity: 0; }

      @keyframes rise {
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes sweep {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body data-state="loading">
    <div class="card">
      <img class="icon" src="icon.png" alt="" />
      <h1 class="title">GVoice</h1>
      <p class="status" id="status">Starting up…</p>
      <div class="track"></div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      // main pushes { state, message } as boot progresses; the final "ready"
      // (or "error") flips the look, and main then animates this window away.
      window.splashBridge.onStatus((data) => {
        if (!data) return;
        if (data.state) document.body.setAttribute("data-state", data.state);
        if (data.message) statusEl.textContent = data.message;
      });
    </script>
  </body>
</html>
