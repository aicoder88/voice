<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GVoice</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        padding: 20px 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101820;
        color: #d7f7ef;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      h1 { margin: 0; font-size: 20px; }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 650;
      }
      .ok { background: #14302a; color: #5fdcb7; border: 1px solid #1f6651; }
      .err { background: #3a1414; color: #ff8c8c; border: 1px solid #7a2a2a; }
      .hint { color: #8cd2c2; font-size: 13px; }
      kbd {
        background: #1a2731;
        border: 1px solid #2a3942;
        border-bottom-width: 2px;
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 12px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        background: #1a2731;
        border: 1px solid #2a3942;
        color: #d7f7ef;
        padding: 6px 12px;
        border-radius: 6px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover { background: #233340; }
      button.primary {
        background: #1f6651;
        border-color: #2a8a6e;
      }
      button.primary:hover { background: #2a8a6e; }
      .stats {
        margin-left: auto;
        color: #8cd2c2;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      textarea {
        flex: 1;
        width: 100%;
        background: #0b131a;
        border: 1px solid #2a3942;
        border-radius: 8px;
        color: #e6fff7;
        padding: 14px 16px;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.55;
        resize: none;
        outline: none;
      }
      textarea:focus { border-color: #2a8a6e; }
      footer {
        font-size: 12px;
        color: #6f8a85;
      }
      footer a { color: #6cd0c2; }
    </style>
  </head>
  <body>
    <header>
      <h1>GVoice</h1>
      <div id="status" class="pill ok">Relay running</div>
      <span class="hint">Hold <kbd id="hotkey-label">right Option (⌥)</kbd> anywhere, speak, release.</span>
    </header>

    <div class="toolbar">
      <button class="primary" id="focus-btn">Focus scratchpad</button>
      <button id="copy-btn">Copy all</button>
      <button id="clear-btn">Clear</button>
      <span class="stats" id="stats">0 words · 0 chars</span>
    </div>

    <textarea
      id="scratch"
      placeholder="Click here, hold right Option, and speak. Your dictation lands directly into this scratchpad. Edit freely, then Copy all to grab the text."
      autofocus
    ></textarea>

    <footer>
      Dictating into another app? Click into any text field on your computer, then hold the hotkey.
      Errors show in the title bar. Quit with <kbd>⌘Q</kbd>.
    </footer>

    <script>
      const params = new URLSearchParams(window.location.search);
      const error = params.get("error");
      const statusEl = document.getElementById("status");
      const hotkeyLabel = document.getElementById("hotkey-label");
      const scratch = document.getElementById("scratch");
      const stats = document.getElementById("stats");
      const isMac = navigator.platform.toLowerCase().includes("mac");
      if (!isMac) hotkeyLabel.textContent = "right Alt";

      if (error) {
        statusEl.className = "pill err";
        statusEl.textContent = "Not running: " + error;
      }

      function updateStats() {
        const text = scratch.value;
        const chars = text.length;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        stats.textContent = words + " words · " + chars + " chars";
      }

      scratch.addEventListener("input", updateStats);
      updateStats();

      document.getElementById("focus-btn").addEventListener("click", () => {
        scratch.focus();
        // place cursor at end
        scratch.setSelectionRange(scratch.value.length, scratch.value.length);
      });

      document.getElementById("copy-btn").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(scratch.value);
          const btn = document.getElementById("copy-btn");
          const original = btn.textContent;
          btn.textContent = "Copied ✓";
          setTimeout(() => { btn.textContent = original; }, 1200);
        } catch {}
      });

      document.getElementById("clear-btn").addEventListener("click", () => {
        scratch.value = "";
        updateStats();
        scratch.focus();
      });
    </script>
  </body>
</html>
