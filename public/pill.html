<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      /* The pill is centered in a transparent window. Every state shares this
         shell; the dot colour, label, and (for results) the action buttons swap
         based on body[data-state]. */
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 14px;
        background: rgba(22, 26, 32, 0.97);
        color: #ffffff;
        border-radius: 999px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        font-size: 14px;
        font-weight: 650;
        width: max-content;
        max-width: calc(100vw - 16px);
      }
      .dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        box-sizing: border-box;
        flex: none;
        background: #ff5a5a; /* listening default */
      }
      /* One line; a reason longer than the pill is ellipsized rather than
         clipping mid-word or shoving the action buttons off-window. The full
         text is always in debug.log. Narrower when action buttons share the row. */
      .label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 380px;
      }
      body.has-actions .label { max-width: 160px; }
      /* Result reasons can be full sentences; let them wrap to two lines
         instead of ellipsizing away the instruction at the end. */
      body[data-state="success"] .label,
      body[data-state="error"] .label {
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        font-size: 13px;
        line-height: 1.25;
      }

      /* --- Per-state dot colour + animation ------------------------------- */
      body[data-state="listening"]    .dot { background: #ff5a5a; animation: pulse 1s ease-in-out infinite; }
      body[data-state="transcribing"] .dot { background: #4aa3ff; animation: pulse 1s ease-in-out infinite; }
      body[data-state="success"]      .dot { background: #34d399; box-shadow: 0 0 10px rgba(52, 211, 153, 0.7); }
      body[data-state="error"]        .dot { background: #ff5a5a; box-shadow: 0 0 10px rgba(255, 90, 90, 0.7); }

      /* --- Action buttons: only on result states ------------------------- */
      .actions { display: none; align-items: center; gap: 6px; margin-left: 4px; }
      body[data-state="success"] .actions,
      body[data-state="error"] .actions { display: flex; }
      .actions button {
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        color: #e7eef5;
        background: rgba(255, 255, 255, 0.12);
        border: 0;
        border-radius: 999px;
        padding: 5px 11px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.12s ease, opacity 0.12s ease;
      }
      .actions button:hover { background: rgba(255, 255, 255, 0.22); }
      .actions button:active { background: rgba(255, 255, 255, 0.3); }
      /* Dismiss is a compact round ✕ — close on demand, set apart from the
         text actions so it's never mistaken for Copy/Open. */
      .actions button.dismiss {
        padding: 0;
        width: 22px;
        height: 22px;
        line-height: 22px;
        font-size: 12px;
        color: #c7d2dc;
      }
      .actions button.dismiss:hover { background: rgba(255, 90, 90, 0.32); color: #fff; }
      /* Divider between the label and the actions. Only shown when at least
         one action button is present (toggled via .has-actions in JS). */
      .sep {
        display: none;
        width: 1px;
        height: 18px;
        background: rgba(255, 255, 255, 0.16);
        margin: 0 2px;
        flex: none;
      }
      body.has-actions .sep { display: block; }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.78); }
      }
    </style>
  </head>
  <body data-state="listening">
    <div class="pill">
      <div class="dot"></div>
      <span class="label" id="label">Listening…</span>
      <span class="sep"></span>
      <div class="actions">
        <button id="copy" type="button">Copy</button>
        <button id="open" type="button">Play recording</button>
        <button id="addword" type="button">Add word</button>
        <!-- Always present on result pills so any pop-up can be dismissed on
             demand, even a bare "No speech detected" with nothing to copy. -->
        <button id="dismiss" class="dismiss" type="button" aria-label="Dismiss" title="Dismiss">✕</button>
      </div>
    </div>

    <script>
      const LABELS = {
        listening: "Listening…",
        transcribing: "Transcribing…",
        success: "Success",
        error: "Error"
      };
      const labelEl = document.getElementById("label");
      const copyBtn = document.getElementById("copy");
      const openBtn = document.getElementById("open");
      const addWordBtn = document.getElementById("addword");
      const dismissBtn = document.getElementById("dismiss");

      // Auto-hide for result states, paused while the pointer is over the pill
      // so there's time to click Copy / Open. A clean success clears fairly
      // quickly (it worked, get out of the way); an error lingers a long time so
      // the user can read it, copy the text, or open the recording without it
      // vanishing mid-reach. Backstopped by main's safety timer (holdMs + 15s).
      const HIDE_BY_STATE = { success: 6000, error: 30000 };
      let currentHideMs = 30000;
      let hideTimer = null;
      function clearHide() { if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; } }
      function armHide(ms) {
        clearHide();
        hideTimer = setTimeout(() => window.pillBridge.hide(), ms);
      }

      function applyState(data) {
        const state = (data && data.state) || "listening";
        document.body.setAttribute("data-state", state);
        // Show main's plain-English reason on result pills when it sent one, so a
        // red dot isn't a bare "Error"; fall back to the generic state label.
        const reason = data && typeof data.reason === "string" ? data.reason.trim() : "";
        labelEl.textContent = (reason && (state === "success" || state === "error"))
          ? reason
          : (LABELS[state] || state);

        const isResult = state === "success" || state === "error";
        const showCopy = isResult && data && data.canCopy;
        const showOpen = isResult && data && data.canOpen;
        copyBtn.style.display = showCopy ? "" : "none";
        openBtn.style.display = showOpen ? "" : "none";
        addWordBtn.style.display = isResult ? "" : "none";
        // Dismiss rides on every result pill, even one with no Copy/Open.
        dismissBtn.style.display = isResult ? "" : "none";
        copyBtn.textContent = "Copy";
        document.body.classList.toggle("has-actions", isResult);

        // Main decides the lingering time per result (it knows whether the
        // paste was confirmed); fall back to the per-state defaults if it didn't.
        currentHideMs = (data && typeof data.holdMs === "number" ? data.holdMs : HIDE_BY_STATE[state]) ?? 8000;
        clearHide();
        if (isResult) armHide(currentHideMs);
        // Fresh state = fresh hover tracking (the window likely moved).
        overPill = false;
      }

      // After the user acts on a button, hold the pill just long enough for the
      // confirmation to register, then go — and make that the new linger, or the
      // hover re-arm below would put the full 30s back after they're done.
      const BUTTON_LINGER_MS = 1400;
      function lingerAfterAction() {
        currentHideMs = BUTTON_LINGER_MS;
        armHide(BUTTON_LINGER_MS);
      }

      copyBtn.addEventListener("click", () => {
        window.pillBridge.copy();
        copyBtn.textContent = "Copied ✓";
        lingerAfterAction();
      });
      openBtn.addEventListener("click", () => {
        window.pillBridge.openRecording();
        lingerAfterAction();
      });
      addWordBtn.addEventListener("click", () => {
        window.pillBridge.addWord();
        lingerAfterAction();
      });
      // Close the pop-up now, whatever state it's in.
      dismissBtn.addEventListener("click", () => window.pillBridge.hide());

      // The window is click-through with forwarded mouse moves (see main.js);
      // track whether the pointer is over the VISIBLE pill and flip real
      // interactivity on only then — the transparent margins never eat clicks.
      // The same boundary drives the hover-pause: linger while the user is
      // reaching for a button, re-arm on leave.
      const pillEl = document.querySelector(".pill");
      let overPill = false;
      document.addEventListener("mousemove", (e) => {
        const over = pillEl.contains(e.target);
        if (over === overPill) return;
        overPill = over;
        const s = document.body.getAttribute("data-state");
        const isResult = s === "success" || s === "error";
        if (isResult) window.pillBridge.setInteractive(over);
        if (over) clearHide();
        else if (isResult) armHide(currentHideMs);
      });

      window.pillBridge.onState(applyState);
    </script>
  </body>
</html>
