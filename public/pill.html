<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        background: rgba(20, 124, 114, 0.96);
        color: #ffffff;
        border-radius: 999px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
        font-size: 14px;
        font-weight: 650;
        width: max-content;
        margin: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff5a5a;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.55; transform: scale(0.8); }
      }
    </style>
  </head>
  <body>
    <div class="pill">
      <div class="dot"></div>
      <span>Listening…</span>
    </div>
  </body>
</html>
